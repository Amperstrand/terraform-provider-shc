---
# Acceptance tests for terraform-provider-shc.
#
# Creates + destroys real SHC Dev VPS VMs. Cost: ~$0.20/run (4 tests
# × ~$0.05 each on dev-1c-4gb). All VMs have auto_cancel=true.
#
# Triggered manually via workflow_dispatch or scheduled weekly.
# Requires: SHC_API_KEY secret

name: acceptance

on:
  workflow_dispatch:
  schedule:
    - cron: '0 5 * * 1'

jobs:
  acceptance:
    name: TF_ACC acceptance tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SHC_API_KEY: ${{ secrets.SHC_API_KEY }}
      TF_ACC: "1"
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.9.0'

      - run: go mod tidy

      - name: Run acceptance tests
        run: make testacc

      - name: Reap orphaned test VMs
        if: always()
        run: |
          pip install -e .
          python3 -c "
          import os
          from shc_toolkit.client import SHCClient
          c = SHCClient(api_key=os.environ['SHC_API_KEY'])
          orphans = c.reap_orphans(max_age_hours=0.0, dry_run=False)
          print(f'Cleaned up {len(orphans)} orphaned VM(s)')
          "
        working-directory: /home/runner/work/terraform-provider-shc/terraform-provider-shc
